<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AG-UI Protocol Test Client</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', monospace; 
            padding: 20px; 
            background: #1a1a2e; 
            color: #eee;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #00d4ff; }
        .controls { 
            display: flex; 
            gap: 10px; 
            margin: 20px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        input[type="text"] { 
            flex: 1;
            min-width: 300px;
            padding: 12px; 
            background: #16213e; 
            color: #eee; 
            border: 1px solid #0f3460;
            border-radius: 4px;
            font-size: 14px;
        }
        button { 
            padding: 12px 20px; 
            background: #0f3460; 
            color: white; 
            border: none; 
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover { background: #1a5276; }
        button.primary { background: #00d4ff; color: #000; }
        button.primary:hover { background: #00b8d4; }
        button.danger { background: #e74c3c; }
        #messages { 
            height: 500px; 
            overflow-y: auto; 
            border: 1px solid #0f3460; 
            padding: 15px; 
            margin: 20px 0;
            background: #16213e;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.6;
        }
        .event { 
            margin: 8px 0; 
            padding: 8px 12px; 
            border-left: 3px solid #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        .event.error { border-left-color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .event.tool { border-left-color: #f39c12; background: rgba(243, 156, 18, 0.1); }
        .event.success { border-left-color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        .timestamp { color: #666; font-size: 11px; }
        .status { 
            margin: 10px 0; 
            padding: 10px;
            background: #0f3460;
            border-radius: 4px;
            font-size: 12px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        pre { 
            background: #0a0a1a; 
            padding: 10px; 
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🎮 AG-UI Protocol Test Client</h1>
    
    <div class="status">
        <strong>服务状态:</strong> 
        <span id="status">未连接</span>
        &nbsp;&nbsp;
        <strong>Session:</strong> 
        <span id="session">-</span>
    </div>

    <div class="controls">
        <input type="text" id="message" placeholder="输入消息..." value="帮我分析一下这个故事的角色关系">
        <button class="primary" onclick="sendStream()">📡 SSE 流式</button>
        <button onclick="sendNormal()">💬 普通发送</button>
        <button onclick="createSession()">🆕 新建会话</button>
        <button onclick="listSessions()">📋 列出会话</button>
        <button class="danger" onclick="clear()">🗑️ 清空</button>
    </div>

    <div class="grid">
        <div>
            <h3>📨 事件流</h3>
            <div id="messages"></div>
        </div>
        <div>
            <h3>📊 统计</h3>
            <pre id="stats">等待事件...</pre>
            <h3>🔧 工具调用</h3>
            <pre id="tools">无</pre>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';
        const messagesDiv = document.getElementById('messages');
        const statsPre = document.getElementById('stats');
        const toolsPre = document.getElementById('tools');
        const statusSpan = document.getElementById('status');
        const sessionSpan = document.getElementById('session');

        let stats = {
            events: 0,
            textChunks: 0,
            toolCalls: 0,
            errors: 0,
            startTime: null
        };
        let currentTools = [];

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `event ${type}`;
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            stats.events++;
            updateStats();
        }

        function updateStats() {
            const elapsed = stats.startTime ? 
                ((Date.now() - stats.startTime) / 1000).toFixed(1) + 's' : '-';
            statsPre.textContent = JSON.stringify({
                ...stats,
                elapsed
            }, null, 2);
        }

        async function checkHealth() {
            try {
                const resp = await fetch(`${API_BASE}/api/health`);
                const data = await resp.json();
                statusSpan.textContent = `✅ ${data.status}`;
                statusSpan.style.color = '#2ecc71';
            } catch (e) {
                statusSpan.textContent = `❌ 连接失败`;
                statusSpan.style.color = '#e74c3c';
            }
        }

        async function createSession() {
            try {
                const resp = await fetch(`${API_BASE}/api/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 'test-user' })
                });
                const data = await resp.json();
                sessionSpan.textContent = data.id;
                log(`✅ 会话创建: ${data.id}`, 'success');
            } catch (e) {
                log(`❌ 创建会话失败: ${e.message}`, 'error');
            }
        }

        async function listSessions() {
            try {
                const resp = await fetch(`${API_BASE}/api/sessions`);
                const data = await resp.json();
                log(`📋 会话列表: ${JSON.stringify(data)}`);
            } catch (e) {
                log(`❌ 获取会话失败: ${e.message}`, 'error');
            }
        }

        async function sendNormal() {
            const msg = document.getElementById('message').value;
            if (!msg) return;
            
            log(`💬 发送: ${msg}`);
            stats.startTime = Date.now();
            
            try {
                const resp = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: msg,
                        session_id: sessionSpan.textContent !== '-' ? sessionSpan.textContent : undefined
                    })
                });
                const data = await resp.json();
                if (data.error) {
                    log(`❌ 错误: ${data.error}`, 'error');
                    stats.errors++;
                } else {
                    log(`✅ 响应 (${data.run_id}): ${data.content}`, 'success');
                }
            } catch (e) {
                log(`❌ 请求失败: ${e.message}`, 'error');
                stats.errors++;
            }
            updateStats();
        }

        async function sendStream() {
            const msg = document.getElementById('message').value;
            if (!msg) return;
            
            log(`📡 SSE 流式发送: ${msg}`);
            stats.startTime = Date.now();
            stats.textChunks = 0;
            stats.toolCalls = 0;
            currentTools = [];
            
            try {
                const resp = await fetch(`${API_BASE}/api/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: msg,
                        session_id: sessionSpan.textContent !== '-' ? sessionSpan.textContent : undefined
                    })
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let currentMessage = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const event = JSON.parse(line.slice(6));
                                handleEvent(event);
                            } catch (e) {
                                log(`⚠️ 解析错误: ${line}`, 'error');
                            }
                        }
                    }
                }
                log('📡 流结束', 'success');
            } catch (e) {
                log(`❌ 流式请求失败: ${e.message}`, 'error');
                stats.errors++;
            }
            updateStats();
        }

        function handleEvent(event) {
            const type = event.type;
            
            switch (type) {
                case 'RUN_START':
                    log(`🚀 <strong>RUN_START</strong> ${event.run_id}`);
                    break;
                    
                case 'TEXT_MESSAGE_START':
                    log(`💬 <strong>TEXT_MESSAGE_START</strong> ${event.message_id}`);
                    break;
                    
                case 'TEXT_MESSAGE_CONTENT':
                    stats.textChunks++;
                    log(`📝 ${event.content}`);
                    break;
                    
                case 'TEXT_MESSAGE_END':
                    log(`✅ <strong>TEXT_MESSAGE_END</strong>`);
                    break;
                    
                case 'TOOL_CALL_START':
                    stats.toolCalls++;
                    currentTools.push({
                        name: event.tool_name,
                        id: event.tool_id,
                        args: null
                    });
                    log(`🔧 <strong>TOOL_CALL_START</strong> ${event.tool_name} (${event.tool_id})`, 'tool');
                    break;
                    
                case 'TOOL_CALL_ARGS':
                    if (currentTools.length > 0) {
                        currentTools[currentTools.length - 1].args = event.args;
                    }
                    log(`📋 <strong>TOOL_CALL_ARGS</strong> ${JSON.stringify(event.args)}`, 'tool');
                    break;
                    
                case 'TOOL_CALL_END':
                    log(`✔️ <strong>TOOL_CALL_END</strong>`, 'tool');
                    break;
                    
                case 'RUN_FINISHED':
                    log(`🏁 <strong>RUN_FINISHED</strong>`, 'success');
                    break;
                    
                case 'RUN_ERROR':
                    log(`❌ <strong>RUN_ERROR</strong> ${event.error}`, 'error');
                    stats.errors++;
                    break;
                    
                case 'CUSTOM':
                    log(`📊 <strong>CUSTOM</strong> ${JSON.stringify(event.meta)}`);
                    break;
                    
                default:
                    log(`❓ 未知事件: ${type}`);
            }
            
            // Update tools display
            if (currentTools.length > 0) {
                toolsPre.textContent = JSON.stringify(currentTools, null, 2);
            }
            
            updateStats();
        }

        function clear() {
            messagesDiv.innerHTML = '';
            statsPre.textContent = '等待事件...';
            toolsPre.textContent = '无';
            stats = { events: 0, textChunks: 0, toolCalls: 0, errors: 0, startTime: null };
            currentTools = [];
        }

        // Check health on load
        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
