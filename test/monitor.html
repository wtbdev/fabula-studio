<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabula Studio - Pipeline Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; 
            color: #eee; 
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00d4ff; margin-bottom: 20px; }
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-card {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            min-width: 150px;
            flex: 1;
        }
        .status-card h3 { 
            color: #00d4ff; 
            font-size: 12px; 
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .status-card .value { 
            font-size: 24px; 
            font-weight: bold;
        }
        .events-container {
            background: #0f0f23;
            border-radius: 8px;
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
        }
        .event {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #1a1a3e;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .event-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }
        .event-type.pipeline_start { background: #00d4ff; color: #000; }
        .event-type.pipeline_end { background: #00ff88; color: #000; }
        .event-type.node_analyzing { background: #ffd700; color: #000; }
        .event-type.node_analyzed { background: #98fb98; color: #000; }
        .event-type.graph_updating { background: #ff6b6b; color: #fff; }
        .event-type.graph_updated { background: #ff9f43; color: #000; }
        .event-type.scene_planning { background: #a29bfe; color: #000; }
        .event-type.scene_planned { background: #6c5ce7; color: #fff; }
        .event-type.scene_writing { background: #fd79a8; color: #000; }
        .event-type.scene_written { background: #e84393; color: #fff; }
        .event-type.editor_reviewing { background: #00cec9; color: #000; }
        .event-type.editor_reviewed { background: #81ecec; color: #000; }
        .event-type.validation { background: #ffeaa7; color: #000; }
        .event-type.error { background: #ff4444; color: #fff; }
        .event-time { color: #666; font-size: 12px; min-width: 80px; }
        .event-message { flex: 1; }
        .event-duration { color: #00d4ff; font-size: 12px; }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #00b8d4; }
        button.danger { background: #ff4444; color: #fff; }
        button.danger:hover { background: #cc0000; }
        .connection-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .connection-status.connected { background: #00ff88; }
        .connection-status.disconnected { background: #ff4444; }
        .test-section {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #0f0f23;
            color: #eee;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Fabula Studio - Pipeline Monitor</h1>
        
        <div class="controls">
            <span class="connection-status disconnected" id="statusDot"></span>
            <span id="connectionStatus">Disconnected</span>
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()" class="danger">Disconnect</button>
            <button onclick="clearEvents()">Clear</button>
            <button onclick="loadTestNovel()">Load Test Novel</button>
        </div>

        <div class="status-bar">
            <div class="status-card">
                <h3>Events</h3>
                <div class="value" id="eventCount">0</div>
            </div>
            <div class="status-card">
                <h3>Current Step</h3>
                <div class="value" id="currentStep">-</div>
            </div>
            <div class="status-card">
                <h3>Duration</h3>
                <div class="value" id="duration">-</div>
            </div>
            <div class="status-card">
                <h3>Status</h3>
                <div class="value" id="pipelineStatus">Idle</div>
            </div>
        </div>

        <div class="events-container" id="eventsContainer">
            <div class="event" style="color: #666;">Waiting for events...</div>
        </div>

        <div class="test-section">
            <h3>Test Conversion</h3>
            <p>Send a test conversion request to the API:</p>
            <button onclick="sendTestRequest()" style="margin-top: 10px;">Send Test Request</button>
            <textarea id="testResponse" readonly placeholder="Response will appear here..."></textarea>
        </div>
    </div>

    <script>
        let eventSource = null;
        let eventCount = 0;
        let startTime = null;

        function connect() {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('http://localhost:8080/api/events/stream');
            
            eventSource.onopen = () => {
                document.getElementById('statusDot').className = 'connection-status connected';
                document.getElementById('connectionStatus').textContent = 'Connected';
            };

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                addEvent(data);
            };

            eventSource.onerror = () => {
                document.getElementById('statusDot').className = 'connection-status disconnected';
                document.getElementById('connectionStatus').textContent = 'Disconnected';
            };
        }

        function disconnect() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            document.getElementById('statusDot').className = 'connection-status disconnected';
            document.getElementById('connectionStatus').textContent = 'Disconnected';
        }

        function addEvent(event) {
            eventCount++;
            document.getElementById('eventCount').textContent = eventCount;
            
            document.getElementById('currentStep').textContent = event.step || '-';
            
            if (event.type === 'pipeline_start') {
                startTime = new Date(event.timestamp);
                document.getElementById('pipelineStatus').textContent = 'Running';
                document.getElementById('pipelineStatus').style.color = '#00ff88';
            } else if (event.type === 'pipeline_end') {
                document.getElementById('pipelineStatus').textContent = 'Complete';
                document.getElementById('pipelineStatus').style.color = '#00ff88';
            } else if (event.type === 'error') {
                document.getElementById('pipelineStatus').textContent = 'Error';
                document.getElementById('pipelineStatus').style.color = '#ff4444';
            }

            if (event.duration) {
                document.getElementById('duration').textContent = formatDuration(event.duration);
            }

            const container = document.getElementById('eventsContainer');
            const eventDiv = document.createElement('div');
            eventDiv.className = 'event';
            
            const time = new Date(event.timestamp);
            const timeStr = time.toLocaleTimeString();
            
            eventDiv.innerHTML = `
                <span class="event-time">${timeStr}</span>
                <span class="event-type ${event.type}">${formatType(event.type)}</span>
                <span class="event-message">${event.message}</span>
                ${event.duration ? `<span class="event-duration">${formatDuration(event.duration)}</span>` : ''}
            `;
            
            container.insertBefore(eventDiv, container.firstChild);
            
            // Keep only last 100 events in UI
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }

        function formatType(type) {
            return type.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function formatDuration(ns) {
            if (typeof ns === 'number') {
                if (ns > 1000000000) return (ns / 1000000000).toFixed(1) + 's';
                if (ns > 1000000) return (ns / 1000000).toFixed(0) + 'ms';
                return ns + 'ns';
            }
            return ns;
        }

        function clearEvents() {
            const container = document.getElementById('eventsContainer');
            container.innerHTML = '<div class="event" style="color: #666;">Waiting for events...</div>';
            eventCount = 0;
            document.getElementById('eventCount').textContent = '0';
        }

        async function sendTestRequest() {
            const responseEl = document.getElementById('testResponse');
            responseEl.value = 'Sending request...';
            
            try {
                const response = await fetch('http://localhost:8080/api/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: '带上她的眼睛',
                        author: '刘慈欣',
                        chapters: [
                            '连续工作了两个多月，我实在累了，便请求主任给我两天假...',
                            '这是高山与平原，草原与森林的交接处...',
                            '又回到了灰色的生活和忙碌的工作中...',
                            '在以后的岁月中，我到过很多地方...'
                        ]
                    })
                });
                const data = await response.json();
                responseEl.value = JSON.stringify(data, null, 2);
            } catch (error) {
                responseEl.value = 'Error: ' + error.message;
            }
        }

        async function loadTestNovel() {
            try {
                const response = await fetch('test/带上她的眼睛-刘慈欣.txt');
                const text = await response.text();
                // Split into chapters (simplified)
                const chapters = text.split(/\n\s*\n/).filter(p => p.trim().length > 100);
                document.getElementById('testResponse').value = `Loaded ${chapters.length} paragraphs from test novel`;
            } catch (error) {
                document.getElementById('testResponse').value = 'Error loading novel: ' + error.message;
            }
        }

        // Auto-connect on load
        connect();
    </script>
</body>
</html>
