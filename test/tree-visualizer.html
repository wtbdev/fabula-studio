<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabula Studio — Pipeline Tree</title>
    <style>
        :root {
            --bg: #f6f3ee;
            --panel: #ffffff;
            --panel-2: #f8fafc;
            --panel-3: #fbfaf7;
            --line: #d8dee8;
            --line-soft: rgba(15, 23, 42, 0.10);
            --text: #172033;
            --muted: #64748b;
            --muted-2: #94a3b8;
            --brand: #d97706;
            --brand-2: #e11d48;
            --ok: #059669;
            --warn: #d97706;
            --bad: #e11d48;
            --blue: #2563eb;
            --gray: #64748b;
            --shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
            --radius: 16px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 14% -10%, rgba(217, 119, 6, 0.10), transparent 30%),
                radial-gradient(circle at 86% 0%, rgba(37, 99, 235, 0.08), transparent 28%),
                linear-gradient(180deg, #faf8f4 0%, #eef2f7 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button, input, textarea { font: inherit; }
        button {
            border: 0;
            cursor: pointer;
            color: var(--text);
            transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease, opacity 0.14s ease;
        }
        button:hover:not(:disabled) { transform: translateY(-1px); }
        button:disabled { cursor: not-allowed; opacity: 0.48; }
        a { color: var(--brand); }

        .app-header {
            height: 64px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--line-soft);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(18px);
            flex-shrink: 0;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 260px;
        }
        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: #fff7ed;
            font-weight: 900;
            box-shadow: 0 10px 28px rgba(217, 119, 6, 0.16);
        }
        .brand h1 { margin: 0; font-size: 16px; letter-spacing: 0.2px; }
        .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
        .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid var(--line-soft);
            background: rgba(15, 23, 42, 0.035);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted-2); }
        .status-idle .status-dot { background: var(--muted-2); }
        .status-running .status-dot { background: var(--warn); box-shadow: 0 0 0 5px rgba(217, 119, 6, 0.12); animation: pulse 1.4s infinite; }
        .status-completed .status-dot { background: var(--ok); }
        .status-failed .status-dot { background: var(--bad); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.48; } }
        .step-label { color: var(--muted); font-size: 12px; max-width: 360px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .layout {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 330px minmax(0, 1fr) 340px;
            grid-template-rows: minmax(0, 1fr) 245px;
            gap: 12px;
            padding: 12px;
        }
        .panel {
            min-height: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.98));
            border: 1px solid var(--line-soft);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .sidebar { grid-row: 1 / 3; display: flex; flex-direction: column; }
        .tree-panel { position: relative; display: flex; flex-direction: column; }
        .detail-panel { display: flex; flex-direction: column; }
        .data-panel { grid-column: 2 / 4; display: grid; grid-template-columns: 1.15fr 0.85fr 1fr; }

        .panel-header {
            padding: 13px 14px;
            border-bottom: 1px solid var(--line-soft);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: rgba(15, 23, 42, 0.018);
        }
        .panel-title { margin: 0; font-size: 12px; color: var(--brand); letter-spacing: 0.12em; text-transform: uppercase; }
        .panel-subtitle { font-size: 12px; color: var(--muted); }
        .panel-body { padding: 14px; overflow: auto; min-height: 0; }
        .sidebar .panel-body { display: flex; flex-direction: column; gap: 14px; }

        .field { display: grid; gap: 6px; }
        .field label { font-size: 12px; color: var(--muted); }
        .field input, .field textarea {
            width: 100%;
            border-radius: 11px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            color: var(--text);
            outline: none;
            padding: 10px 11px;
        }
        .field input:focus, .field textarea:focus { border-color: rgba(217, 119, 6, 0.62); box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.12); }
        textarea { min-height: 160px; resize: vertical; line-height: 1.55; }
        .hint { color: var(--muted-2); font-size: 12px; line-height: 1.45; }

        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 9px 12px; border-radius: 10px; background: rgba(15, 23, 42, 0.045); border: 1px solid var(--line-soft); }
        .btn.primary { width: 100%; justify-content: center; background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #ffffff; font-weight: 800; border: 0; }
        .btn.secondary { flex: 1; min-width: 108px; }
        .btn.danger { background: rgba(225, 29, 72, 0.08); border-color: rgba(225, 29, 72, 0.20); color: #9f1239; }
        .btn.small { padding: 7px 9px; font-size: 12px; border-radius: 9px; }

        .progress-wrap { display: grid; gap: 8px; }
        .progress-bar { height: 8px; background: rgba(15, 23, 42, 0.08); border-radius: 999px; overflow: hidden; border: 1px solid rgba(15,23,42,0.06); }
        .progress-fill { height: 100%; width: 0%; border-radius: inherit; background: linear-gradient(90deg, var(--brand), var(--ok)); transition: width 0.3s ease; }
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .metric { padding: 10px; border-radius: 12px; background: rgba(255, 255, 255, 0.68); border: 1px solid var(--line-soft); }
        .metric .value { font-size: 18px; font-weight: 800; color: var(--text); }
        .metric .label { margin-top: 2px; font-size: 11px; color: var(--muted-2); }

        .tree-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line-soft);
            background: rgba(248, 250, 252, 0.72);
            flex-wrap: wrap;
        }
        .tree-toolbar .spacer { flex: 1; }
        .tree-container { flex: 1; min-height: 0; overflow: hidden; background: radial-gradient(circle at center, rgba(217,119,6,0.055), transparent 42%), var(--panel-3); }
        .tree-stage { transform-origin: 0 0; width: fit-content; height: fit-content; }
        .tree-container svg { display: block; }
        .node-rect { cursor: pointer; transition: stroke 0.16s ease, filter 0.16s ease; }
        .node-rect:hover { filter: drop-shadow(0 0 10px rgba(217, 119, 6, 0.24)); }
        .node-text { fill: var(--text); pointer-events: none; font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
        .node-meta { pointer-events: none; font-size: 9px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
        .link { fill: none; stroke: rgba(100, 116, 139, 0.36); stroke-width: 1.6; }
        .empty-state { height: 100%; display: grid; place-items: center; text-align: center; color: var(--muted-2); padding: 28px; }
        .empty-state strong { display: block; color: var(--muted); margin-bottom: 6px; }
        .legend { display: flex; gap: 10px; flex-wrap: wrap; color: var(--muted); font-size: 11px; }
        .legend-item { display: inline-flex; align-items: center; gap: 5px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

        .detail-body { overflow: auto; padding: 14px; }
        .detail-field { padding: 10px 0; border-bottom: 1px solid rgba(15,23,42,0.07); }
        .detail-field:first-child { padding-top: 0; }
        .detail-label { color: var(--muted-2); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
        .detail-value { color: var(--text); font-size: 13px; line-height: 1.55; overflow-wrap: anywhere; }
        .pill-list { display: flex; flex-wrap: wrap; gap: 5px; }
        .pill { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; background: rgba(217, 119, 6, 0.10); border: 1px solid rgba(217, 119, 6, 0.18); color: #92400e; font-size: 11px; }

        .data-section { min-width: 0; overflow: hidden; display: flex; flex-direction: column; border-right: 1px solid var(--line-soft); }
        .data-section:last-child { border-right: 0; }
        .data-scroll { overflow: auto; padding: 12px; min-height: 0; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { color: var(--muted-2); text-align: left; font-weight: 600; padding: 7px 8px; border-bottom: 1px solid var(--line-soft); white-space: nowrap; }
        td { padding: 7px 8px; border-bottom: 1px solid rgba(15,23,42,0.055); vertical-align: top; color: #334155; }
        .card-list { display: grid; gap: 8px; }
        .scene-card { background: rgba(255, 255, 255, 0.72); border: 1px solid var(--line-soft); border-left: 3px solid var(--brand); border-radius: 12px; padding: 10px; }
        .scene-card .heading { font-size: 12px; font-weight: 800; color: var(--text); }
        .scene-card .synopsis { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.45; }

        .log-panel { max-height: 138px; overflow: auto; background: rgba(248, 250, 252, 0.76); border-top: 1px solid var(--line-soft); padding: 9px 14px; font-size: 12px; }
        .log-entry { display: flex; gap: 8px; padding: 3px 0; color: var(--muted); line-height: 1.35; }
        .log-entry .ts { color: var(--muted-2); flex-shrink: 0; }
        .log-entry.error { color: #be123c; }
        .log-entry.success { color: #047857; }
        .log-entry.warn { color: #92400e; }

        @media (max-width: 1180px) {
            body { overflow: auto; }
            .layout { grid-template-columns: 320px minmax(0, 1fr); grid-template-rows: 520px 360px 260px; overflow: visible; }
            .sidebar { grid-row: 1 / 3; }
            .detail-panel { grid-column: 2; grid-row: 2; }
            .data-panel { grid-column: 1 / 3; grid-row: 3; }
        }
        @media (max-width: 820px) {
            .app-header { height: auto; align-items: flex-start; flex-direction: column; padding: 12px; }
            .layout { display: flex; flex-direction: column; overflow: visible; }
            .sidebar, .tree-panel, .detail-panel, .data-panel { min-height: 360px; }
            .data-panel { display: flex; flex-direction: column; }
            .data-section { min-height: 220px; border-right: 0; border-bottom: 1px solid var(--line-soft); }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">F</div>
            <div>
                <h1>Fabula Studio Pipeline Tree</h1>
                <p>小说到剧本转换过程可视化</p>
            </div>
        </div>
        <div class="header-actions">
            <span id="statusBadge" class="status-badge status-idle"><span class="status-dot"></span><span id="statusText">IDLE</span></span>
            <span id="stepLabel" class="step-label">等待开始</span>
            <a class="btn small" href="/jaeger/" target="_blank" rel="noreferrer">Jaeger</a>
        </div>
    </header>

    <main class="layout">
        <aside class="panel sidebar">
            <div class="panel-header">
                <h2 class="panel-title">Pipeline Control</h2>
            </div>
            <div class="panel-body">
                <div class="field">
                    <label for="titleInput">小说标题</label>
                    <input type="text" id="titleInput" placeholder="默认：未命名小说">
                </div>
                <div class="field">
                    <label for="authorInput">作者</label>
                    <input type="text" id="authorInput" placeholder="默认：未知作者">
                </div>
                <div class="field">
                    <label for="chaptersInput">小说全文</label>
                    <textarea id="chaptersInput" placeholder="粘贴全文，或加载保留的测试小说。系统会按章节标题或段落自动切分。"></textarea>
                    <div class="hint" id="textStats">0 字，0 段</div>
                </div>
                <button id="startBtn" class="btn primary" type="button">开始转换</button>
                <div class="btn-row">
                    <button class="btn secondary" type="button" id="loadSampleBtn">加载测试小说</button>
                    <button class="btn secondary" type="button" id="clearInputBtn">清空输入</button>
                </div>

                <div class="progress-wrap">
                    <div class="panel-subtitle">进度</div>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="hint" id="progressLabel">等待开始</div>
                </div>

                <div class="metrics">
                    <div class="metric"><div class="value" id="metricNodes">0</div><div class="label">节点</div></div>
                    <div class="metric"><div class="value" id="metricLeaves">0</div><div class="label">叶子</div></div>
                    <div class="metric"><div class="value" id="metricDepth">0</div><div class="label">深度</div></div>
                </div>

                <div class="btn-row">
                    <button class="btn secondary" type="button" id="refreshBtn">刷新状态</button>
                    <button class="btn secondary" type="button" id="treeBtn">完整树</button>
                    <button class="btn secondary" type="button" id="graphBtn">角色图谱</button>
                    <button class="btn secondary" type="button" id="plansBtn">场景规划</button>
                </div>
                <div class="btn-row">
                    <button class="btn danger" type="button" id="clearLogBtn">清空日志</button>
                </div>
            </div>
            <div class="log-panel" id="logPanel"></div>
        </aside>

        <section class="panel tree-panel">
            <div class="panel-header">
                <h2 class="panel-title">Story Tree</h2>
                <div class="legend">
                    <span class="legend-item"><span class="legend-dot" style="background:var(--ok)"></span>keep</span>
                    <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>split</span>
                    <span class="legend-item"><span class="legend-dot" style="background:var(--warn)"></span>merge</span>
                    <span class="legend-item"><span class="legend-dot" style="background:var(--gray)"></span>summary</span>
                    <span class="legend-item"><span class="legend-dot" style="background:var(--bad)"></span>discard</span>
                </div>
            </div>
            <div class="tree-toolbar">
                <button class="btn small" type="button" id="zoomOutBtn">缩小</button>
                <button class="btn small" type="button" id="zoomResetBtn">100%</button>
                <button class="btn small" type="button" id="zoomInBtn">放大</button>
                <span class="hint" id="zoomLabel">100%</span>
                <span class="spacer"></span>
                <button class="btn small" type="button" id="fitBtn">定位根节点</button>
            </div>
            <div class="tree-container" id="treeContainer">
                <div class="tree-stage" id="treeStage">
                    <svg id="treeSvg" width="1200" height="620"></svg>
                </div>
            </div>
        </section>

        <aside class="panel detail-panel">
            <div class="panel-header">
                <h2 class="panel-title">Node Detail</h2>
                <span class="panel-subtitle" id="selectedLabel">未选择</span>
            </div>
            <div class="detail-body" id="nodeDetails">
                <div class="empty-state"><div><strong>未选择节点</strong><span>点击树上的节点查看摘要、角色、事件和文本片段。</span></div></div>
            </div>
        </aside>

        <section class="panel data-panel">
            <div class="data-section">
                <div class="panel-header"><h2 class="panel-title">Characters</h2><span class="panel-subtitle" id="charCount">0</span></div>
                <div class="data-scroll">
                    <table>
                        <thead><tr><th>角色</th><th>目标</th><th>情绪</th><th>已知信息</th></tr></thead>
                        <tbody id="charTableBody"><tr><td colspan="4" class="hint">暂无数据</td></tr></tbody>
                    </table>
                </div>
            </div>
            <div class="data-section">
                <div class="panel-header"><h2 class="panel-title">Plans</h2><span class="panel-subtitle" id="planCount">0</span></div>
                <div class="data-scroll"><div id="plansList" class="card-list"><span class="hint">暂无数据</span></div></div>
            </div>
            <div class="data-section">
                <div class="panel-header"><h2 class="panel-title">Scenes</h2><span class="panel-subtitle" id="sceneCount">0</span></div>
                <div class="data-scroll"><div id="scenesList" class="card-list"><span class="hint">暂无数据</span></div></div>
            </div>
        </section>
    </main>

    <script>
    const API = '';
    const SAMPLE_NOVEL_PATH = '/带上她的眼睛-刘慈欣.txt';
    const state = {
        eventSource: null,
        treeData: null,
        selectedNodeId: null,
        zoom: 1,
        lastStatus: null
    };

    const el = {
        statusBadge: document.getElementById('statusBadge'),
        statusText: document.getElementById('statusText'),
        stepLabel: document.getElementById('stepLabel'),
        progressFill: document.getElementById('progressFill'),
        progressLabel: document.getElementById('progressLabel'),
        titleInput: document.getElementById('titleInput'),
        authorInput: document.getElementById('authorInput'),
        chaptersInput: document.getElementById('chaptersInput'),
        textStats: document.getElementById('textStats'),
        startBtn: document.getElementById('startBtn'),
        logPanel: document.getElementById('logPanel'),
        treeContainer: document.getElementById('treeContainer'),
        treeStage: document.getElementById('treeStage'),
        treeSvg: document.getElementById('treeSvg'),
        zoomLabel: document.getElementById('zoomLabel'),
        nodeDetails: document.getElementById('nodeDetails'),
        selectedLabel: document.getElementById('selectedLabel'),
        metricNodes: document.getElementById('metricNodes'),
        metricLeaves: document.getElementById('metricLeaves'),
        metricDepth: document.getElementById('metricDepth'),
        charTableBody: document.getElementById('charTableBody'),
        charCount: document.getElementById('charCount'),
        plansList: document.getElementById('plansList'),
        planCount: document.getElementById('planCount'),
        scenesList: document.getElementById('scenesList'),
        sceneCount: document.getElementById('sceneCount')
    };

    const decisionColors = {
        keep: '#34d399',
        split: '#60a5fa',
        merge_right: '#fbbf24',
        summarize_only: '#94a3b8',
        discard: '#fb7185'
    };

    const NODE_W = 156;
    const NODE_H = 48;
    const H_GAP = 20;
    const V_GAP = 70;

    function log(message, cls = '') {
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + cls;
        entry.innerHTML = `<span class="ts">${new Date().toLocaleTimeString()}</span><span>${escapeHtml(message)}</span>`;
        el.logPanel.appendChild(entry);
        el.logPanel.scrollTop = el.logPanel.scrollHeight;
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#96;');
    }

    function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
    }

    async function requestJSON(path, options) {
        const response = await fetch(API + path, options);
        const text = await response.text();
        let data = null;
        if (text) {
            try { data = JSON.parse(text); }
            catch { data = { raw: text }; }
        }
        if (!response.ok) {
            const message = data && (data.error || data.message) ? (data.error || data.message) : response.statusText;
            throw new Error(`${response.status} ${message}`);
        }
        return data;
    }

    function updateTextStats() {
        const raw = el.chaptersInput.value;
        const chars = raw.trim().length;
        const paragraphs = raw.split(/\n\s*\n/).filter(part => part.trim().length > 0).length;
        el.textStats.textContent = `${chars} 字，${paragraphs} 段`;
    }

    function splitNovel(raw) {
        const text = raw.trim();
        if (!text) return [];
        const chapterPattern = /^第[一二三四五六七八九十百千\d]+[章回节卷集部篇]|^Chapter\s+\d+|^CHAPTER\s+\d+/m;
        if (chapterPattern.test(text)) {
            return text
                .split(/(?=^第[一二三四五六七八九十百千\d]+[章回节卷集部篇]|^Chapter\s+\d+|^CHAPTER\s+\d+)/m)
                .map(chapter => chapter.trim())
                .filter(Boolean);
        }

        const paragraphs = text.split(/\n\s*\n/).map(part => part.trim()).filter(Boolean);
        const chapters = [];
        let buffer = '';
        for (const paragraph of paragraphs) {
            if (buffer && buffer.length + paragraph.length > 2000) {
                chapters.push(buffer);
                buffer = paragraph;
            } else {
                buffer = buffer ? `${buffer}\n\n${paragraph}` : paragraph;
            }
        }
        if (buffer) chapters.push(buffer);
        return chapters;
    }

    async function loadSampleNovel() {
        try {
            const response = await fetch(SAMPLE_NOVEL_PATH);
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            el.chaptersInput.value = await response.text();
            if (!el.titleInput.value.trim()) el.titleInput.value = '带上她的眼睛';
            if (!el.authorInput.value.trim()) el.authorInput.value = '刘慈欣';
            updateTextStats();
            log('测试小说已加载', 'success');
        } catch (error) {
            log(`加载测试小说失败: ${error.message}`, 'error');
        }
    }

    async function fetchStatus() {
        try {
            const status = await requestJSON('/api/pipeline/status');
            state.lastStatus = status;
            updateStatusUI(status || {});
        } catch (error) {
            log(`获取状态失败: ${error.message}`, 'error');
        }
    }

    function updateStatusUI(status) {
        const currentState = status.state || 'idle';
        const progress = clamp(Number(status.progress || 0), 0, 100);
        el.statusBadge.className = `status-badge status-${currentState}`;
        el.statusText.textContent = currentState.toUpperCase();
        el.stepLabel.textContent = status.current_step || (currentState === 'idle' ? '等待开始' : '');
        el.progressFill.style.width = `${progress}%`;
        el.progressLabel.textContent = currentState === 'running'
            ? `${status.current_step || '运行中'} (${progress}%)`
            : currentState === 'completed'
                ? '完成'
                : currentState === 'failed'
                    ? `失败: ${status.error || '未知错误'}`
                    : '等待开始';
    }

    async function startConversion() {
        const title = el.titleInput.value.trim();
        const author = el.authorInput.value.trim();
        const chapters = splitNovel(el.chaptersInput.value);
        if (!chapters.length) {
            log('请填写小说文本', 'error');
            return;
        }

        resetRunState();
        el.startBtn.disabled = true;
        log(`开始转换: ${title || '未命名小说'}，${chapters.length} 段文本`);
        connectSSE();

        try {
            const result = await requestJSON('/api/convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, author, chapters })
            });
            if (result && result.error) {
                log(`转换失败: ${result.error}`, 'error');
                return;
            }
            log('转换完成', 'success');
            await Promise.allSettled([fetchFullTree(), fetchGraph(), fetchPlans()]);
        } catch (error) {
            log(`转换请求失败: ${error.message}`, 'error');
        } finally {
            el.startBtn.disabled = false;
        }
    }

    function resetRunState() {
        state.treeData = null;
        state.selectedNodeId = null;
        el.selectedLabel.textContent = '未选择';
        el.nodeDetails.innerHTML = '<div class="empty-state"><div><strong>未选择节点</strong><span>点击树上的节点查看摘要、角色、事件和文本片段。</span></div></div>';
        renderTree();
        renderMetrics();
    }

    function connectSSE() {
        if (state.eventSource) state.eventSource.close();
        state.eventSource = new EventSource(API + '/api/events/stream');
        state.eventSource.onopen = () => log('SSE 已连接', 'success');
        state.eventSource.onmessage = event => {
            try { handleEvent(JSON.parse(event.data)); }
            catch { log('收到无法解析的 SSE 消息', 'warn'); }
        };
        state.eventSource.onerror = () => log('SSE 连接断开，后续可手动刷新状态', 'warn');
    }

    function handleEvent(event) {
        const details = event.details || {};
        switch (event.type) {
            case 'pipeline_start':
                log(event.message || '管线启动');
                fetchStatus();
                break;
            case 'tree_snapshot':
                if (details.tree) {
                    state.treeData = details.tree;
                    renderTree();
                    renderMetrics();
                    log(`故事树已构建: ${Object.keys(state.treeData.nodes || {}).length} 节点`, 'success');
                }
                break;
            case 'tree_node_added':
                if (details.node) {
                    addNodeFromData(details.node);
                    log(event.message || '新增树节点');
                }
                break;
            case 'node_analyzing':
                if (event.node_id && state.treeData?.nodes?.[event.node_id]) {
                    state.treeData.nodes[event.node_id]._analyzing = true;
                    renderTree();
                }
                fetchStatus();
                break;
            case 'node_analyzed':
                if (event.step === 'analyze_node' && details.node) updateNodeFromData(details.node);
                break;
            case 'graph_updated':
                if (details.new_characters?.length) log(`新角色: ${details.new_characters.join(', ')}`);
                if (details.characters_count !== undefined) log(`角色图谱: ${details.characters_count} 角色`);
                fetchStatus();
                break;
            case 'scene_planned':
                if (details.plans) renderPlans(details.plans);
                log(`场景规划完成: ${details.plans_count || 0} 计划`, 'success');
                fetchStatus();
                break;
            case 'scene_written':
                if (details.scenes) renderSceneHeadings(details.scenes);
                log(event.message || '场景已生成', 'success');
                fetchStatus();
                break;
            case 'editor_reviewed':
                if (details.issues) log(`总编审查: ${details.issues.length} 个问题`);
                fetchStatus();
                break;
            case 'pipeline_end':
                log(event.message || '管线完成', 'success');
                if (details.screenplay) renderScreenplay(details.screenplay);
                fetchStatus();
                fetchFullTree();
                break;
            case 'error':
                log(event.error || event.message || '管线错误', 'error');
                fetchStatus();
                break;
            default:
                if (event.message) log(event.message);
        }
    }

    function ensureTreeData() {
        if (!state.treeData) state.treeData = { root_node_id: '', nodes: {}, leaf_node_ids: [], max_depth: 0 };
    }

    function addNodeFromData(node) {
        ensureTreeData();
        state.treeData.nodes[node.id] = node;
        if (!state.treeData.root_node_id && Number(node.level || 0) <= 0) state.treeData.root_node_id = node.id;
        renderTree();
        renderMetrics();
    }

    function updateNodeFromData(node) {
        ensureTreeData();
        state.treeData.nodes[node.id] = { ...(state.treeData.nodes[node.id] || {}), ...node, _analyzing: false };
        if (!state.treeData.root_node_id && Number(node.level || 0) <= 0) state.treeData.root_node_id = node.id;
        renderTree();
        renderMetrics();
        if (state.selectedNodeId === node.id) renderNodeDetails(node.id);
    }

    async function fetchFullTree() {
        try {
            state.treeData = await requestJSON('/api/tree');
            renderTree();
            renderMetrics();
            log(`完整树已加载: ${Object.keys(state.treeData.nodes || {}).length} 节点`, 'success');
        } catch (error) {
            log(`拉取树失败: ${error.message}`, 'error');
        }
    }

    async function fetchGraph() {
        try {
            renderGraph(await requestJSON('/api/graph'));
            log('角色图谱已加载', 'success');
        } catch (error) {
            log(`拉取图谱失败: ${error.message}`, 'error');
        }
    }

    async function fetchPlans() {
        try {
            const data = await requestJSON('/api/plans');
            renderPlans(data?.plans || []);
            log('场景规划已加载', 'success');
        } catch (error) {
            log(`拉取规划失败: ${error.message}`, 'error');
        }
    }

    function renderMetrics() {
        const nodes = state.treeData?.nodes || {};
        const nodeCount = Object.keys(nodes).length;
        const leaves = state.treeData?.leaf_node_ids?.length || Object.values(nodes).filter(node => !node.children_ids?.length).length;
        const depth = state.treeData?.max_depth ?? Object.values(nodes).reduce((max, node) => Math.max(max, Number(node.level || 0)), 0);
        el.metricNodes.textContent = nodeCount;
        el.metricLeaves.textContent = leaves;
        el.metricDepth.textContent = depth;
    }

    function renderTree() {
        const tree = state.treeData;
        if (!tree || !tree.root_node_id || !tree.nodes?.[tree.root_node_id]) {
            el.treeSvg.setAttribute('width', 1200);
            el.treeSvg.setAttribute('height', 620);
            el.treeSvg.innerHTML = `<foreignObject x="0" y="0" width="1200" height="620"><div xmlns="http://www.w3.org/1999/xhtml" class="empty-state"><div><strong>等待管线运行</strong><span>开始转换后会实时绘制故事树，也可以点击“完整树”拉取已有结果。</span></div></div></foreignObject>`;
            fitTreeToViewport();
            return;
        }

        const nodes = tree.nodes;
        const childrenOf = {};
        for (const id in nodes) {
            const children = nodes[id].children_ids || [];
            if (children.length) childrenOf[id] = children.filter(childId => nodes[childId]);
        }

        const positions = {};
        const subtreeWidths = {};
        const visiting = new Set();

        function computeWidth(id) {
            if (visiting.has(id)) return NODE_W;
            visiting.add(id);
            const children = childrenOf[id] || [];
            if (!children.length) {
                subtreeWidths[id] = NODE_W;
            } else {
                let total = 0;
                for (const childId of children) total += computeWidth(childId);
                total += Math.max(0, children.length - 1) * H_GAP;
                subtreeWidths[id] = Math.max(NODE_W, total);
            }
            visiting.delete(id);
            return subtreeWidths[id];
        }

        function assign(id, x, y) {
            positions[id] = { x, y };
            const children = childrenOf[id] || [];
            if (!children.length) return;
            let childX = x - subtreeWidths[id] / 2;
            for (const childId of children) {
                const width = subtreeWidths[childId] || NODE_W;
                assign(childId, childX + width / 2, y + NODE_H + V_GAP);
                childX += width + H_GAP;
            }
        }

        computeWidth(tree.root_node_id);
        const rootX = Math.max((subtreeWidths[tree.root_node_id] || NODE_W) / 2 + 40, 620);
        assign(tree.root_node_id, rootX, 34);

        let maxX = 0;
        let maxY = 0;
        for (const pos of Object.values(positions)) {
            maxX = Math.max(maxX, pos.x + NODE_W / 2);
            maxY = Math.max(maxY, pos.y + NODE_H);
        }
        const width = Math.max(1200, maxX + 80);
        const height = Math.max(620, maxY + 80);
        el.treeSvg.setAttribute('width', width);
        el.treeSvg.setAttribute('height', height);

        let html = '';
        for (const parentId in childrenOf) {
            const parent = positions[parentId];
            if (!parent) continue;
            for (const childId of childrenOf[parentId]) {
                const child = positions[childId];
                if (!child) continue;
                const x1 = parent.x;
                const y1 = parent.y + NODE_H / 2;
                const x2 = child.x;
                const y2 = child.y - NODE_H / 2;
                const midY = (y1 + y2) / 2;
                html += `<path class="link" d="M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}"/>`;
            }
        }

        for (const id in positions) {
            const node = nodes[id];
            const pos = positions[id];
            const isRoot = id === tree.root_node_id;
            const color = isRoot ? '#f59e0b' : (decisionColors[node.decision] || '#64748b');
            const selected = id === state.selectedNodeId;
            const analyzing = Boolean(node._analyzing);
            const label = makeNodeLabel(node, isRoot);
            const rectX = pos.x - NODE_W / 2;
            const rectY = pos.y - NODE_H / 2;
            const stroke = analyzing ? '#fbbf24' : selected ? '#f8fafc' : color;
            const strokeWidth = analyzing || selected ? 3 : 2;
            const fillOpacity = analyzing ? '3f' : '24';
            html += `<g class="node" data-id="${escapeAttr(id)}">`;
            html += `<rect class="node-rect" x="${rectX}" y="${rectY}" width="${NODE_W}" height="${NODE_H}" rx="12" ry="12" fill="${color}${fillOpacity}" stroke="${stroke}" stroke-width="${strokeWidth}" onclick="selectNode('${escapeAttr(id)}')"/>`;
            html += `<text class="node-text" x="${pos.x}" y="${pos.y + 4}" text-anchor="middle">${escapeHtml(label)}</text>`;
            if (!isRoot && node.decision) html += `<text class="node-meta" x="${rectX + 8}" y="${rectY + 13}" fill="${color}">${escapeHtml(node.decision)}</text>`;
            if (node.level !== undefined) html += `<text class="node-meta" x="${rectX + NODE_W - 8}" y="${rectY + 13}" text-anchor="end" fill="#94a3b8">L${escapeHtml(node.level)}</text>`;
            html += '</g>';
        }

        el.treeSvg.innerHTML = html;
        fitTreeToViewport();
    }

    function makeNodeLabel(node, isRoot) {
        const raw = isRoot
            ? (node.summary || node.text_content || 'ROOT')
            : (node.summary || node.main_conflict || node.id || 'node');
        const text = String(raw).replace(/\s+/g, ' ').trim();
        const limit = isRoot ? 16 : 15;
        return text.length > limit ? `${text.slice(0, limit)}…` : text;
    }

    window.selectNode = function selectNode(id) {
        state.selectedNodeId = id;
        renderTree();
        renderNodeDetails(id);
    };

    function renderNodeDetails(id) {
        const node = state.treeData?.nodes?.[id];
        if (!node) {
            el.selectedLabel.textContent = '未找到';
            el.nodeDetails.innerHTML = '<div class="empty-state"><div><strong>节点未找到</strong></div></div>';
            return;
        }
        el.selectedLabel.textContent = id;
        const isRoot = id === state.treeData.root_node_id;
        const rows = [];
        rows.push(field('ID', `${escapeHtml(id)}${isRoot ? ' (根节点)' : ''}`));
        rows.push(field('层级', node.level ?? '-'));
        if (node.decision) rows.push(field('决策', `<span style="color:${decisionColors[node.decision] || '#fff'}">${escapeHtml(node.decision)}</span>`));
        if (node.summary) rows.push(field('摘要', escapeHtml(node.summary)));
        if (node.main_conflict) rows.push(field('主要冲突', escapeHtml(node.main_conflict)));
        if (node.characters?.length) rows.push(listField('角色', node.characters));
        if (node.events?.length) rows.push(listField('事件', node.events.map(event => event.description || JSON.stringify(event))));
        if (node.location) rows.push(field('地点', escapeHtml(node.location)));
        if (node.time_frame) rows.push(field('时间', escapeHtml(node.time_frame)));
        if (node.split_reason) rows.push(field('拆分原因', escapeHtml(node.split_reason)));
        if (node.children_ids?.length) rows.push(listField('子节点', node.children_ids));
        if (node.parent_id) rows.push(field('父节点', escapeHtml(node.parent_id)));
        if (node.right_neighbor) rows.push(field('右邻居', escapeHtml(node.right_neighbor)));
        if (node.text_content) rows.push(field('文本片段', escapeHtml(truncate(node.text_content, 520))));
        el.nodeDetails.innerHTML = rows.join('');
    }

    function field(label, value) {
        return `<div class="detail-field"><div class="detail-label">${escapeHtml(label)}</div><div class="detail-value">${value}</div></div>`;
    }

    function listField(label, items) {
        const pills = items.map(item => `<span class="pill">${escapeHtml(item)}</span>`).join('');
        return `<div class="detail-field"><div class="detail-label">${escapeHtml(label)}</div><div class="detail-value pill-list">${pills}</div></div>`;
    }

    function truncate(value, limit) {
        const text = String(value || '').trim();
        return text.length > limit ? `${text.slice(0, limit)}…` : text;
    }

    function renderGraph(data) {
        const characters = data?.characters || [];
        el.charCount.textContent = characters.length;
        if (!characters.length) {
            el.charTableBody.innerHTML = '<tr><td colspan="4" class="hint">暂无数据</td></tr>';
            return;
        }
        el.charTableBody.innerHTML = characters.map(character => `<tr>
            <td>${escapeHtml(character.name || character.id || '-')}</td>
            <td>${escapeHtml(character.current_goal || '-')}</td>
            <td>${escapeHtml(character.emotional_state || '-')}</td>
            <td>${escapeHtml((character.known_info || []).join(', ') || '-')}</td>
        </tr>`).join('');
    }

    function renderPlans(plans) {
        el.planCount.textContent = plans?.length || 0;
        if (!plans?.length) {
            el.plansList.innerHTML = '<span class="hint">暂无数据</span>';
            return;
        }
        el.plansList.innerHTML = plans.map(plan => `<div class="scene-card">
            <div class="heading">${escapeHtml(plan.id || '?')} — ${escapeHtml(plan.purpose || '')}</div>
            <div class="synopsis">地点: ${escapeHtml(plan.location || '?')} | 场景: ${escapeHtml(plan.scene_count || 0)} | 节点: ${escapeHtml((plan.source_node_ids || []).join(', ') || '-')}</div>
        </div>`).join('');
    }

    function renderScreenplay(screenplay) {
        const scenes = screenplay?.scenes || [];
        el.sceneCount.textContent = scenes.length;
        if (!scenes.length) {
            el.scenesList.innerHTML = '<span class="hint">暂无场景</span>';
            return;
        }
        el.scenesList.innerHTML = scenes.map(scene => `<div class="scene-card">
            <div class="heading">${escapeHtml(scene.heading || scene.id || '?')}</div>
            <div class="synopsis">${escapeHtml(truncate(scene.synopsis || '', 160))}</div>
        </div>`).join('');
    }

    function renderSceneHeadings(headings) {
        const items = headings || [];
        el.sceneCount.textContent = items.length;
        el.scenesList.innerHTML = items.length
            ? items.map(heading => `<div class="scene-card"><div class="heading">${escapeHtml(heading)}</div></div>`).join('')
            : '<span class="hint">暂无场景</span>';
    }

    function setZoom(nextZoom) {
        state.zoom = clamp(nextZoom, 0.35, 1.8);
        applyZoom();
    }

    function fitTreeToViewport() {
        const svgWidth = Number(el.treeSvg.getAttribute('width')) || 1200;
        const svgHeight = Number(el.treeSvg.getAttribute('height')) || 620;
        const box = el.treeContainer.getBoundingClientRect();
        if (!box.width || !box.height) return;
        const scaleX = (box.width - 20) / svgWidth;
        const scaleY = (box.height - 20) / svgHeight;
        state.zoom = clamp(Math.min(scaleX, scaleY, 1), 0.35, 1.2);
        applyZoom();
    }

    function applyZoom() {
        el.treeStage.style.transform = `scale(${state.zoom})`;
        const svgWidth = Number(el.treeSvg.getAttribute('width')) || 1200;
        const svgHeight = Number(el.treeSvg.getAttribute('height')) || 620;
        el.treeStage.style.width = `${svgWidth * state.zoom}px`;
        el.treeStage.style.height = `${svgHeight * state.zoom}px`;
        el.zoomLabel.textContent = `${Math.round(state.zoom * 100)}%`;
    }

    function focusRoot() {
        const root = state.treeData?.root_node_id;
        if (!root) return;
        const rootNode = el.treeSvg.querySelector(`[data-id="${CSS.escape(root)}"]`);
        if (!rootNode) return;
        const rect = rootNode.getBoundingClientRect();
        const box = el.treeContainer.getBoundingClientRect();
        const left = rect.left - box.left - box.width / 2 + rect.width / 2;
        const top = rect.top - box.top - 40;
        if (Math.abs(left) > 1 || Math.abs(top) > 1) {
            el.treeContainer.scrollBy({ left, top, behavior: 'smooth' });
        }
    }

    function bindEvents() {
        el.startBtn.addEventListener('click', startConversion);
        el.chaptersInput.addEventListener('input', updateTextStats);
        document.getElementById('loadSampleBtn').addEventListener('click', loadSampleNovel);
        document.getElementById('clearInputBtn').addEventListener('click', () => { el.chaptersInput.value = ''; updateTextStats(); });
        document.getElementById('refreshBtn').addEventListener('click', fetchStatus);
        document.getElementById('treeBtn').addEventListener('click', fetchFullTree);
        document.getElementById('graphBtn').addEventListener('click', fetchGraph);
        document.getElementById('plansBtn').addEventListener('click', fetchPlans);
        document.getElementById('clearLogBtn').addEventListener('click', () => { el.logPanel.innerHTML = ''; });
        document.getElementById('zoomOutBtn').addEventListener('click', () => setZoom(state.zoom - 0.1));
        document.getElementById('zoomResetBtn').addEventListener('click', fitTreeToViewport);
        document.getElementById('zoomInBtn').addEventListener('click', () => setZoom(state.zoom + 0.1));
        document.getElementById('fitBtn').addEventListener('click', focusRoot);
        window.addEventListener('resize', fitTreeToViewport);
    }

    bindEvents();
    updateTextStats();
    renderTree();
    fitTreeToViewport();
    renderMetrics();
    fetchStatus();
    </script>
</body>
</html>
