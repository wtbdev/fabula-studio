<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabula Studio — Unit Pipeline</title>
    <style>
        :root {
            --bg: #f6f3ee;
            --panel: #ffffff;
            --panel-soft: #f8fafc;
            --line: rgba(15, 23, 42, 0.12);
            --text: #172033;
            --muted: #64748b;
            --muted-2: #94a3b8;
            --brand: #d97706;
            --brand-2: #e11d48;
            --ok: #059669;
            --warn: #d97706;
            --bad: #e11d48;
            --blue: #2563eb;
            --shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
            --radius: 16px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 14% -10%, rgba(217, 119, 6, 0.10), transparent 30%),
                radial-gradient(circle at 86% 0%, rgba(37, 99, 235, 0.08), transparent 28%),
                linear-gradient(180deg, #faf8f4 0%, #eef2f7 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button, input, textarea { font: inherit; }
        button {
            border: 0;
            cursor: pointer;
            color: var(--text);
            transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease, opacity 0.14s ease;
        }
        button:hover:not(:disabled) { transform: translateY(-1px); }
        button:disabled { cursor: not-allowed; opacity: 0.48; }
        a { color: var(--brand); text-decoration: none; }

        .app-header {
            height: 64px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(18px);
            flex-shrink: 0;
        }
        .brand { display: flex; align-items: center; gap: 12px; min-width: 260px; }
        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: #fff7ed;
            font-weight: 900;
            box-shadow: 0 10px 28px rgba(217, 119, 6, 0.16);
        }
        .brand h1 { margin: 0; font-size: 16px; letter-spacing: 0.2px; }
        .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
        .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid var(--line);
            background: rgba(15, 23, 42, 0.035);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted-2); }
        .status-running .status-dot { background: var(--warn); box-shadow: 0 0 0 5px rgba(217, 119, 6, 0.12); animation: pulse 1.4s infinite; }
        .status-completed .status-dot { background: var(--ok); }
        .status-failed .status-dot { background: var(--bad); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.48; } }
        .step-label { color: var(--muted); font-size: 12px; max-width: 360px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .layout {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 330px minmax(0, 1fr) 360px;
            grid-template-rows: minmax(0, 1fr) 300px;
            gap: 12px;
            padding: 12px;
        }
        .panel {
            min-height: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.98));
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .sidebar { grid-row: 1 / 3; display: flex; flex-direction: column; }
        .unit-panel { display: flex; flex-direction: column; }
        .detail-panel { display: flex; flex-direction: column; }
        .result-panel { grid-column: 2 / 4; display: grid; grid-template-columns: 1fr 1fr; }
        .panel-header {
            padding: 13px 14px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: rgba(15, 23, 42, 0.018);
        }
        .panel-title { margin: 0; font-size: 12px; color: var(--brand); letter-spacing: 0.12em; text-transform: uppercase; }
        .panel-subtitle { font-size: 12px; color: var(--muted); }
        .panel-body { padding: 14px; overflow: auto; min-height: 0; }
        .sidebar .panel-body { display: flex; flex-direction: column; gap: 14px; }

        .field { display: grid; gap: 6px; }
        .field label { font-size: 12px; color: var(--muted); }
        .field input, .field textarea {
            width: 100%;
            border-radius: 11px;
            border: 1px solid #d8dee8;
            background: rgba(255, 255, 255, 0.82);
            color: var(--text);
            outline: none;
            padding: 10px 11px;
        }
        .field input:focus, .field textarea:focus { border-color: rgba(217, 119, 6, 0.62); box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.12); }
        textarea { min-height: 160px; resize: vertical; line-height: 1.55; }
        .hint { color: var(--muted-2); font-size: 12px; line-height: 1.45; }

        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 9px 12px; border-radius: 10px; background: rgba(15, 23, 42, 0.045); border: 1px solid var(--line); }
        .btn.primary { width: 100%; justify-content: center; background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #ffffff; font-weight: 800; border: 0; }
        .btn.secondary { flex: 1; min-width: 108px; }
        .btn.danger { background: rgba(225, 29, 72, 0.08); border-color: rgba(225, 29, 72, 0.20); color: #9f1239; }
        .btn.small { padding: 7px 9px; font-size: 12px; border-radius: 9px; }

        .progress-wrap { display: grid; gap: 8px; }
        .progress-bar { height: 8px; background: rgba(15, 23, 42, 0.08); border-radius: 999px; overflow: hidden; border: 1px solid rgba(15,23,42,0.06); }
        .progress-fill { height: 100%; width: 0%; border-radius: inherit; background: linear-gradient(90deg, var(--brand), var(--ok)); transition: width 0.3s ease; }
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .metric { padding: 10px; border-radius: 12px; background: rgba(255, 255, 255, 0.68); border: 1px solid var(--line); }
        .metric .value { font-size: 18px; font-weight: 800; color: var(--text); }
        .metric .label { margin-top: 2px; font-size: 11px; color: var(--muted-2); }

        .unit-list { display: grid; gap: 10px; }
        .unit-card, .scene-card {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
            border-left: 4px solid var(--brand);
            border-radius: 13px;
            padding: 12px;
        }
        .unit-card { cursor: pointer; }
        .unit-card:hover { background: #fff; }
        .unit-card.selected { border-color: rgba(217, 119, 6, 0.48); box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.10); }
        .unit-head, .scene-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
        .unit-title, .scene-title { font-size: 13px; font-weight: 800; color: var(--text); }
        .unit-meta, .scene-meta { margin-top: 5px; color: var(--muted); font-size: 12px; line-height: 1.45; }
        .unit-summary, .scene-synopsis { margin-top: 8px; color: #334155; font-size: 13px; line-height: 1.5; }
        .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--line); background: rgba(15, 23, 42, 0.045); color: var(--muted); white-space: nowrap; }
        .badge.scene, .badge.keep { color: #047857; background: rgba(5, 150, 105, 0.08); border-color: rgba(5, 150, 105, 0.18); }
        .badge.summary, .badge.summarize_only { color: #92400e; background: rgba(217, 119, 6, 0.10); border-color: rgba(217, 119, 6, 0.18); }
        .badge.discard { color: #9f1239; background: rgba(225, 29, 72, 0.08); border-color: rgba(225, 29, 72, 0.18); }
        .pill-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .pill { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; background: rgba(217, 119, 6, 0.10); border: 1px solid rgba(217, 119, 6, 0.18); color: #92400e; font-size: 11px; }

        .detail-body { overflow: auto; padding: 14px; }
        .detail-field { padding: 10px 0; border-bottom: 1px solid rgba(15,23,42,0.07); }
        .detail-field:first-child { padding-top: 0; }
        .detail-label { color: var(--muted-2); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
        .detail-value { color: var(--text); font-size: 13px; line-height: 1.55; overflow-wrap: anywhere; white-space: pre-wrap; }
        .empty-state { height: 100%; display: grid; place-items: center; text-align: center; color: var(--muted-2); padding: 28px; }
        .empty-state strong { display: block; color: var(--muted); margin-bottom: 6px; }

        .result-section { min-width: 0; overflow: hidden; display: flex; flex-direction: column; border-right: 1px solid var(--line); }
        .result-section:last-child { border-right: 0; }
        .result-scroll { overflow: auto; padding: 12px; min-height: 0; }
        .scene-content { margin-top: 8px; display: grid; gap: 5px; }
        .scene-line { font-size: 12px; line-height: 1.45; color: #334155; padding: 6px 8px; border-radius: 8px; background: rgba(15, 23, 42, 0.035); }
        .yaml-output {
            margin: 0;
            min-height: 100%;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #1f2937;
        }
        .log-panel { max-height: 138px; overflow: auto; background: rgba(248, 250, 252, 0.76); border-top: 1px solid var(--line); padding: 9px 14px; font-size: 12px; }
        .log-entry { display: flex; gap: 8px; padding: 3px 0; color: var(--muted); line-height: 1.35; }
        .log-entry .ts { color: var(--muted-2); flex-shrink: 0; }
        .log-entry.error { color: #be123c; }
        .log-entry.success { color: #047857; }
        .log-entry.warn { color: #92400e; }

        @media (max-width: 1180px) {
            body { overflow: auto; }
            .layout { grid-template-columns: 320px minmax(0, 1fr); grid-template-rows: 520px 360px 420px; overflow: visible; }
            .sidebar { grid-row: 1 / 3; }
            .detail-panel { grid-column: 2; grid-row: 2; }
            .result-panel { grid-column: 1 / 3; grid-row: 3; }
        }
        @media (max-width: 820px) {
            .app-header { height: auto; align-items: flex-start; flex-direction: column; padding: 12px; }
            .layout { display: flex; flex-direction: column; overflow: visible; }
            .sidebar, .unit-panel, .detail-panel, .result-panel { min-height: 360px; }
            .result-panel { display: flex; flex-direction: column; }
            .result-section { min-height: 260px; border-right: 0; border-bottom: 1px solid var(--line); }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">F</div>
            <div>
                <h1>Fabula Studio Unit Pipeline</h1>
                <p>句子聚合、场景规划与剧本输出</p>
            </div>
        </div>
        <div class="header-actions">
            <span id="statusBadge" class="status-badge status-idle"><span class="status-dot"></span><span id="statusText">IDLE</span></span>
            <span id="stepLabel" class="step-label">等待开始</span>
            <a class="btn small" href="/jaeger/" target="_blank" rel="noreferrer">Jaeger</a>
        </div>
    </header>

    <main class="layout">
        <aside class="panel sidebar">
            <div class="panel-header"><h2 class="panel-title">Pipeline Control</h2></div>
            <div class="panel-body">
                <div class="field">
                    <label for="titleInput">小说标题</label>
                    <input type="text" id="titleInput" placeholder="默认：未命名小说">
                </div>
                <div class="field">
                    <label for="authorInput">作者</label>
                    <input type="text" id="authorInput" placeholder="默认：未知作者">
                </div>
                <div class="field">
                    <label for="chaptersInput">小说全文</label>
                    <textarea id="chaptersInput" placeholder="粘贴全文，或加载保留的测试小说。系统会按章节标题或段落自动切分。"></textarea>
                    <div class="hint" id="textStats">0 字，0 段</div>
                </div>
                <button id="startBtn" class="btn primary" type="button">开始转换</button>
                <div class="btn-row">
                    <button class="btn secondary" type="button" id="loadSampleBtn">加载测试小说</button>
                    <button class="btn secondary" type="button" id="clearInputBtn">清空输入</button>
                </div>

                <div class="progress-wrap">
                    <div class="panel-subtitle">进度</div>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="hint" id="progressLabel">等待开始</div>
                </div>

                <div class="metrics">
                    <div class="metric"><div class="value" id="metricNodes">0</div><div class="label">节点</div></div>
                    <div class="metric"><div class="value" id="metricLeaves">0</div><div class="label">单元</div></div>
                    <div class="metric"><div class="value" id="metricScenes">0</div><div class="label">场景</div></div>
                </div>

                <div class="btn-row">
                    <button class="btn secondary" type="button" id="refreshBtn">刷新状态</button>
                    <button class="btn secondary" type="button" id="treeBtn">剧情单元</button>
                    <button class="btn secondary" type="button" id="plansBtn">场景规划</button>
                    <button class="btn secondary" type="button" id="screenplayBtn">剧本结果</button>
                </div>
                <div class="btn-row">
                    <button class="btn danger" type="button" id="clearLogBtn">清空日志</button>
                </div>
            </div>
            <div class="log-panel" id="logPanel"></div>
        </aside>

        <section class="panel unit-panel">
            <div class="panel-header">
                <h2 class="panel-title">Story Units</h2>
                <span class="panel-subtitle" id="unitCount">0</span>
            </div>
            <div class="panel-body">
                <div id="unitList" class="unit-list"><div class="empty-state"><div><strong>暂无剧情单元</strong><span>开始转换后会显示句子聚合结果。</span></div></div></div>
            </div>
        </section>

        <aside class="panel detail-panel">
            <div class="panel-header">
                <h2 class="panel-title">Unit Detail</h2>
                <span class="panel-subtitle" id="selectedLabel">未选择</span>
            </div>
            <div class="detail-body" id="unitDetails">
                <div class="empty-state"><div><strong>未选择单元</strong><span>点击左侧剧情单元查看句子范围、边界原因和原文。</span></div></div>
            </div>
        </aside>

        <section class="panel result-panel">
            <div class="result-section">
                <div class="panel-header">
                    <h2 class="panel-title">Screenplay Scenes</h2>
                    <span class="panel-subtitle" id="sceneCount">0</span>
                </div>
                <div class="result-scroll"><div id="scenesList" class="unit-list"><span class="hint">暂无场景</span></div></div>
            </div>
            <div class="result-section">
                <div class="panel-header">
                    <h2 class="panel-title">Full YAML</h2>
                    <button class="btn small" type="button" id="copyYamlBtn">复制 YAML</button>
                </div>
                <div class="result-scroll"><pre id="yamlOutput" class="yaml-output">暂无 YAML 输出</pre></div>
            </div>
        </section>
    </main>

    <script>
    const API = '';
    const SAMPLE_NOVEL_PATH = '/带上她的眼睛-刘慈欣.txt';
    const state = {
        eventSource: null,
        treeData: null,
        selectedUnitId: null,
        screenplay: null,
        yaml: '',
        lastStatus: null
    };

    const el = {
        statusBadge: document.getElementById('statusBadge'),
        statusText: document.getElementById('statusText'),
        stepLabel: document.getElementById('stepLabel'),
        progressFill: document.getElementById('progressFill'),
        progressLabel: document.getElementById('progressLabel'),
        titleInput: document.getElementById('titleInput'),
        authorInput: document.getElementById('authorInput'),
        chaptersInput: document.getElementById('chaptersInput'),
        textStats: document.getElementById('textStats'),
        startBtn: document.getElementById('startBtn'),
        logPanel: document.getElementById('logPanel'),
        metricNodes: document.getElementById('metricNodes'),
        metricLeaves: document.getElementById('metricLeaves'),
        metricScenes: document.getElementById('metricScenes'),
        unitCount: document.getElementById('unitCount'),
        unitList: document.getElementById('unitList'),
        unitDetails: document.getElementById('unitDetails'),
        selectedLabel: document.getElementById('selectedLabel'),
        scenesList: document.getElementById('scenesList'),
        sceneCount: document.getElementById('sceneCount'),
        yamlOutput: document.getElementById('yamlOutput')
    };

    function log(message, cls = '') {
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + cls;
        entry.innerHTML = `<span class="ts">${new Date().toLocaleTimeString()}</span><span>${escapeHtml(message)}</span>`;
        el.logPanel.appendChild(entry);
        el.logPanel.scrollTop = el.logPanel.scrollHeight;
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
    }

    function truncate(value, limit) {
        const text = String(value || '').trim();
        return text.length > limit ? `${text.slice(0, limit)}…` : text;
    }

    async function requestJSON(path, options) {
        const response = await fetch(API + path, options);
        const text = await response.text();
        let data = null;
        if (text) {
            try { data = JSON.parse(text); }
            catch { data = { raw: text }; }
        }
        if (!response.ok) {
            const message = data && (data.error || data.message) ? (data.error || data.message) : response.statusText;
            throw new Error(`${response.status} ${message}`);
        }
        return data;
    }

    function updateTextStats() {
        const raw = el.chaptersInput.value;
        const chars = raw.trim().length;
        const paragraphs = raw.split(/\n\s*\n/).filter(part => part.trim().length > 0).length;
        el.textStats.textContent = `${chars} 字，${paragraphs} 段`;
    }

    function splitNovel(raw) {
        const text = raw.trim();
        if (!text) return [];
        const chapterPattern = /^第[一二三四五六七八九十百千\d]+[章回节卷集部篇]|^Chapter\s+\d+|^CHAPTER\s+\d+/m;
        if (chapterPattern.test(text)) {
            return text
                .split(/(?=^第[一二三四五六七八九十百千\d]+[章回节卷集部篇]|^Chapter\s+\d+|^CHAPTER\s+\d+)/m)
                .map(chapter => chapter.trim())
                .filter(Boolean);
        }
        const paragraphs = text.split(/\n\s*\n/).map(part => part.trim()).filter(Boolean);
        const chapters = [];
        let buffer = '';
        for (const paragraph of paragraphs) {
            if (buffer && buffer.length + paragraph.length > 2000) {
                chapters.push(buffer);
                buffer = paragraph;
            } else {
                buffer = buffer ? `${buffer}\n\n${paragraph}` : paragraph;
            }
        }
        if (buffer) chapters.push(buffer);
        return chapters;
    }

    async function loadSampleNovel() {
        try {
            const response = await fetch(SAMPLE_NOVEL_PATH);
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            el.chaptersInput.value = await response.text();
            if (!el.titleInput.value.trim()) el.titleInput.value = '带上她的眼睛';
            if (!el.authorInput.value.trim()) el.authorInput.value = '刘慈欣';
            updateTextStats();
            log('测试小说已加载', 'success');
        } catch (error) {
            log(`加载测试小说失败: ${error.message}`, 'error');
        }
    }

    async function fetchStatus() {
        try {
            const status = await requestJSON('/api/pipeline/status');
            state.lastStatus = status;
            updateStatusUI(status || {});
        } catch (error) {
            log(`获取状态失败: ${error.message}`, 'error');
        }
    }

    function updateStatusUI(status) {
        const currentState = status.state || 'idle';
        const progress = clamp(Number(status.progress || 0), 0, 100);
        el.statusBadge.className = `status-badge status-${currentState}`;
        el.statusText.textContent = currentState.toUpperCase();
        el.stepLabel.textContent = status.current_step || (currentState === 'idle' ? '等待开始' : '');
        el.progressFill.style.width = `${progress}%`;
        el.progressLabel.textContent = currentState === 'running'
            ? `${status.current_step || '运行中'} (${progress}%)`
            : currentState === 'completed'
                ? '完成'
                : currentState === 'failed'
                    ? `失败: ${status.error || '未知错误'}`
                    : '等待开始';
    }

    async function startConversion() {
        const title = el.titleInput.value.trim();
        const author = el.authorInput.value.trim();
        const chapters = splitNovel(el.chaptersInput.value);
        if (!chapters.length) {
            log('请填写小说文本', 'error');
            return;
        }

        resetRunState();
        el.startBtn.disabled = true;
        log(`开始转换: ${title || '未命名小说'}，${chapters.length} 段文本`);
        connectSSE();

        try {
            const result = await requestJSON('/api/convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, author, chapters })
            });
            if (result && result.error) {
                log(`转换失败: ${result.error}`, 'error');
                return;
            }
            if (result?.screenplay) renderScreenplay(result.screenplay);
            if (result?.yaml) renderYAML(result.yaml);
            log('转换完成，剧本已渲染', 'success');
            await Promise.allSettled([fetchFullTree(), fetchPlans()]);
        } catch (error) {
            log(`转换请求失败: ${error.message}`, 'error');
        } finally {
            el.startBtn.disabled = false;
        }
    }

    function resetRunState() {
        state.treeData = null;
        state.selectedUnitId = null;
        state.screenplay = null;
        state.yaml = '';
        el.unitList.innerHTML = '<div class="empty-state"><div><strong>暂无剧情单元</strong><span>开始转换后会显示句子聚合结果。</span></div></div>';
        el.unitDetails.innerHTML = '<div class="empty-state"><div><strong>未选择单元</strong><span>点击左侧剧情单元查看句子范围、边界原因和原文。</span></div></div>';
        el.selectedLabel.textContent = '未选择';
        el.scenesList.innerHTML = '<span class="hint">暂无场景</span>';
        el.yamlOutput.textContent = '暂无 YAML 输出';
        renderMetrics();
    }

    function connectSSE() {
        if (state.eventSource) state.eventSource.close();
        state.eventSource = new EventSource(API + '/api/events/stream');
        state.eventSource.onopen = () => log('SSE 已连接', 'success');
        state.eventSource.onmessage = event => {
            try { handleEvent(JSON.parse(event.data)); }
            catch { log('收到无法解析的 SSE 消息', 'warn'); }
        };
        state.eventSource.onerror = () => log('SSE 连接断开，后续以 HTTP 响应为准', 'warn');
    }

    function handleEvent(event) {
        const details = event.details || {};
        switch (event.type) {
            case 'pipeline_start':
                log(event.message || '管线启动');
                fetchStatus();
                break;
            case 'tree_snapshot':
                if (details.tree) {
                    state.treeData = details.tree;
                    renderUnits();
                    renderMetrics();
                    log(`剧情单元已构建: ${getUnits().length} 个`, 'success');
                }
                break;
            case 'graph_updated':
                if (details.new_characters?.length) log(`新角色: ${details.new_characters.join(', ')}`);
                if (details.characters_count !== undefined) log(`角色图谱: ${details.characters_count} 角色`);
                fetchStatus();
                break;
            case 'scene_planned':
                if (details.plans) renderPlans(details.plans);
                log(`场景规划完成: ${details.plans_count || 0} 计划`, 'success');
                fetchStatus();
                break;
            case 'scene_written':
                if (details.scenes) renderSceneHeadings(details.scenes);
                log(event.message || '场景已生成', 'success');
                fetchStatus();
                break;
            case 'editor_reviewed':
                if (details.issues) log(`总编审查: ${details.issues.length} 个问题`);
                fetchStatus();
                break;
            case 'pipeline_end':
                log(event.message || '管线完成', 'success');
                if (details.screenplay) renderScreenplay(details.screenplay);
                if (details.yaml) renderYAML(details.yaml);
                fetchStatus();
                fetchFullTree();
                break;
            case 'error':
                log(event.error || event.message || '管线错误', 'error');
                fetchStatus();
                break;
            default:
                if (event.message) log(event.message);
        }
    }

    async function fetchFullTree() {
        try {
            state.treeData = await requestJSON('/api/tree');
            renderUnits();
            renderMetrics();
            log(`剧情单元已加载: ${getUnits().length} 个`, 'success');
        } catch (error) {
            log(`拉取剧情单元失败: ${error.message}`, 'error');
        }
    }

    async function fetchPlans() {
        try {
            const data = await requestJSON('/api/plans');
            renderPlans(data?.plans || []);
            log('场景规划已加载', 'success');
        } catch (error) {
            log(`拉取规划失败: ${error.message}`, 'error');
        }
    }

    async function fetchScreenplay() {
        try {
            const data = await requestJSON('/api/screenplay');
            if (data?.screenplay) renderScreenplay(data.screenplay);
            if (data?.yaml) renderYAML(data.yaml);
            log('剧本结果已加载', 'success');
        } catch (error) {
            log(`拉取剧本失败: ${error.message}`, 'error');
        }
    }

    function getUnits() {
        const tree = state.treeData;
        if (!tree?.nodes) return [];
        const ids = tree.leaf_node_ids?.length ? tree.leaf_node_ids : Object.keys(tree.nodes).filter(id => id !== tree.root_node_id);
        return ids.map(id => tree.nodes[id]).filter(Boolean);
    }

    function renderMetrics() {
        const nodes = state.treeData?.nodes || {};
        const units = getUnits();
        const scenes = state.screenplay?.scenes || [];
        el.metricNodes.textContent = Object.keys(nodes).length;
        el.metricLeaves.textContent = units.length;
        el.metricScenes.textContent = scenes.length;
        el.unitCount.textContent = String(units.length);
        el.sceneCount.textContent = String(scenes.length);
    }

    function renderUnits() {
        const units = getUnits();
        el.unitCount.textContent = String(units.length);
        if (!units.length) {
            el.unitList.innerHTML = '<div class="empty-state"><div><strong>暂无剧情单元</strong><span>开始转换后会显示句子聚合结果。</span></div></div>';
            return;
        }
        el.unitList.innerHTML = units.map(unit => {
            const selected = unit.id === state.selectedUnitId ? ' selected' : '';
            const type = unit.unit_type || unit.decision || 'unit';
            const range = unit.start_sentence_id || unit.end_sentence_id ? `${unit.start_sentence_id || '?'} → ${unit.end_sentence_id || '?'}` : `chapter ${Number(unit.source_chapter ?? 0) + 1}`;
            const characters = (unit.characters || []).slice(0, 5).map(name => `<span class="pill">${escapeHtml(name)}</span>`).join('');
            return `<article class="unit-card${selected}" data-id="${escapeHtml(unit.id)}" onclick="selectUnit('${escapeHtml(unit.id)}')">
                <div class="unit-head"><div><div class="unit-title">${escapeHtml(unit.id)}</div><div class="unit-meta">${escapeHtml(range)} · ${escapeHtml(unit.location || '-')} · ${escapeHtml(unit.time_frame || '-')}</div></div><span class="badge ${escapeHtml(type)}">${escapeHtml(type)}</span></div>
                <div class="unit-summary">${escapeHtml(unit.summary || unit.main_conflict || truncate(unit.text_content, 120) || '暂无摘要')}</div>
                ${characters ? `<div class="pill-list">${characters}</div>` : ''}
            </article>`;
        }).join('');
    }

    window.selectUnit = function selectUnit(id) {
        state.selectedUnitId = id;
        renderUnits();
        renderUnitDetails(id);
    };

    function renderUnitDetails(id) {
        const unit = state.treeData?.nodes?.[id];
        if (!unit) {
            el.selectedLabel.textContent = '未找到';
            el.unitDetails.innerHTML = '<div class="empty-state"><div><strong>单元未找到</strong></div></div>';
            return;
        }
        el.selectedLabel.textContent = id;
        const rows = [];
        rows.push(field('ID', escapeHtml(unit.id)));
        rows.push(field('类型', `<span class="badge ${escapeHtml(unit.unit_type || unit.decision || '')}">${escapeHtml(unit.unit_type || unit.decision || '-')}</span>`));
        rows.push(field('句子范围', `${escapeHtml(unit.start_sentence_id || '-')} → ${escapeHtml(unit.end_sentence_id || '-')}`));
        if (unit.summary) rows.push(field('摘要', escapeHtml(unit.summary)));
        if (unit.main_conflict) rows.push(field('主要冲突', escapeHtml(unit.main_conflict)));
        if (unit.characters?.length) rows.push(field('角色', `<div class="pill-list">${unit.characters.map(name => `<span class="pill">${escapeHtml(name)}</span>`).join('')}</div>`));
        if (unit.location) rows.push(field('地点', escapeHtml(unit.location)));
        if (unit.time_frame) rows.push(field('时间', escapeHtml(unit.time_frame)));
        if (unit.boundary_reason) rows.push(field('边界原因', escapeHtml(unit.boundary_reason)));
        if (unit.source_sentence_ids?.length) rows.push(field('源句子ID', `<div class="pill-list">${unit.source_sentence_ids.map(id => `<span class="pill">${escapeHtml(id)}</span>`).join('')}</div>`));
        if (unit.text_content) rows.push(field('原文', escapeHtml(unit.text_content)));
        el.unitDetails.innerHTML = rows.join('');
    }

    function field(label, value) {
        return `<div class="detail-field"><div class="detail-label">${escapeHtml(label)}</div><div class="detail-value">${value}</div></div>`;
    }

    function renderPlans(plans) {
        if (!plans?.length) return;
        log(`已获取 ${plans.length} 个场景规划`);
    }

    function renderScreenplay(screenplay) {
        state.screenplay = screenplay;
        const scenes = screenplay?.scenes || [];
        el.sceneCount.textContent = String(scenes.length);
        if (!scenes.length) {
            el.scenesList.innerHTML = '<span class="hint">暂无场景</span>';
            renderMetrics();
            return;
        }
        el.scenesList.innerHTML = scenes.map(scene => `<article class="scene-card">
            <div class="scene-head"><div><div class="scene-title">${escapeHtml(scene.heading || scene.id || '?')}</div><div class="scene-meta">${escapeHtml(scene.id || '-')} · #${escapeHtml(scene.sequence || '-')} · ${(scene.characters_present || []).map(escapeHtml).join(', ') || '无角色'}</div></div></div>
            <div class="scene-synopsis">${escapeHtml(scene.synopsis || '')}</div>
            <div class="scene-content">${(scene.content || []).slice(0, 6).map(line => `<div class="scene-line"><strong>${escapeHtml(line.type || '')}</strong>${line.character ? ` · ${escapeHtml(line.character)}` : ''}: ${escapeHtml(line.text || '')}</div>`).join('')}</div>
        </article>`).join('');
        renderMetrics();
    }

    function renderSceneHeadings(headings) {
        if (state.screenplay?.scenes?.length) return;
        const items = headings || [];
        el.sceneCount.textContent = String(items.length);
        el.scenesList.innerHTML = items.length
            ? items.map(heading => `<article class="scene-card"><div class="scene-title">${escapeHtml(heading)}</div></article>`).join('')
            : '<span class="hint">暂无场景</span>';
    }

    function renderYAML(yaml) {
        state.yaml = yaml || '';
        el.yamlOutput.textContent = state.yaml || '暂无 YAML 输出';
    }

    async function copyYAML() {
        if (!state.yaml) {
            log('暂无 YAML 可复制', 'warn');
            return;
        }
        try {
            await navigator.clipboard.writeText(state.yaml);
            log('YAML 已复制', 'success');
        } catch (error) {
            log(`复制失败: ${error.message}`, 'error');
        }
    }

    function bindEvents() {
        el.startBtn.addEventListener('click', startConversion);
        el.chaptersInput.addEventListener('input', updateTextStats);
        document.getElementById('loadSampleBtn').addEventListener('click', loadSampleNovel);
        document.getElementById('clearInputBtn').addEventListener('click', () => { el.chaptersInput.value = ''; updateTextStats(); });
        document.getElementById('refreshBtn').addEventListener('click', fetchStatus);
        document.getElementById('treeBtn').addEventListener('click', fetchFullTree);
        document.getElementById('plansBtn').addEventListener('click', fetchPlans);
        document.getElementById('screenplayBtn').addEventListener('click', fetchScreenplay);
        document.getElementById('clearLogBtn').addEventListener('click', () => { el.logPanel.innerHTML = ''; });
        document.getElementById('copyYamlBtn').addEventListener('click', copyYAML);
    }

    bindEvents();
    updateTextStats();
    renderMetrics();
    fetchStatus().then(() => {
        if (state.lastStatus?.state === 'completed') {
            Promise.allSettled([fetchFullTree(), fetchScreenplay()]);
        }
    });
    </script>
</body>
</html>
